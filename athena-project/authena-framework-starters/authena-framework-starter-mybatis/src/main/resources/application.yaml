# ======================= 数据库配置 ========================= #
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/architecta?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&rewriteBatchedStatements=true&useSSL=false&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true&--compress=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
    validationQuery: 'SELECT 1'
    stat-view-servlet:
      # 默认true 内置监控页面首页/druid/index.html
      enabled: true
      url-pattern: '/druid/*'
      # 允许清空统计数据
      reset-enable: true
      # 这里为登录页面账号密码配置
      login-username: admin
      login-password: 123456
      # IP白名单 多个逗号分隔
      #      allow:
      # IP黑名单
    #      deny:
    filter:
      stat:
        # 开启监控sql
        enabled: true
        # 显示并标注慢sql 默认当超过3秒显示
        log-slow-sql: false
        slow-sql-millis: 3000
        merge-sql: true
      # 防SQL注入过滤
      wall:
        config:
          # 允许多条sql同时执行
          multi-statement-allow: true
# mybatis config
mybatis:
  mapper-locations: 'classpath:mapper/*.xml'

# mybatis plus 配置
mybatis-plus:
  mapper-locations: 'classpath*:mapper/*.xml'
  global-config:
    #数据库相关配置
    db-config:
      #主键类型  AUTO:"数据库ID自增", INPUT:"用户输入ID", ID_WORKER:"全局唯一ID (数字类型唯一ID)", UUID:"全局唯一ID UUID";
      id-type: AUTO
      logic-delete-value: 1
      logic-not-delete-value: 0
    # 是否开启 LOGO
    banner: true
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    #配置JdbcTypeForNull
    jdbc-type-for-null: 'null'
