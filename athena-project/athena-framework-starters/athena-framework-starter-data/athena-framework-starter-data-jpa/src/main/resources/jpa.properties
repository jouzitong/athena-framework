# ❗生产只能 validate / none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# ❗必须关，防止事务泄漏
spring.jpa.open-in-view=false

# 关闭二级缓存
spring.jpa.properties.hibernate.cache.use-second-level-cache=false
spring.jpa.properties.hibernate.cache.use-query-cache=false

# 统计 / 监控 / 慢 SQL
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.session.events.log.LOG_SLOW_QUERY=true
spring.jpa.properties.hibernate.session.events.log.slow_query_threshold_ms=500


spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true


